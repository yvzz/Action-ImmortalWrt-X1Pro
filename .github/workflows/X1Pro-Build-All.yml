name: Build ImmortalWrt X1Pro All

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: 0 20 */3 * *   # UTC 20:00 = 北京 04:00，每3天一次
  repository_dispatch:
    types: [ "X1Pro Update" ]
  workflow_dispatch:
    inputs:
      notes:
        description: '编译备注（发布到 Release 页面）'
        required: false
        type: string
        default: ''
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/yvzz/immortalwrt-mt798x-6.6'
      commit:
        description: '指定源码commit，留空拉取最新'
        required: false
        type: string
        default: ''
      ssh:
        description: 'SSH 调试 (make menuconfig)'
        required: false
        type: boolean
        default: false
      verbose:
        description: '详细编译日志 V=s'
        required: false
        type: boolean
        default: false
      release:
        description: '发布到 Release'
        required: false
        type: boolean
        default: true

env:
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo || 'https://github.com/yvzz/immortalwrt-mt798x-6.6' }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release || github.event.client_payload.release || 'true' }}
  BUILD_NOTES: ${{ github.event.inputs.notes || github.event.client_payload.notes || '' }}
  TZ: Asia/Shanghai

jobs:
  # ── SSH 调试（仅手动触发 + ssh=true 时） ──────────
  menuconfig:
    name: Menuconfig
    if: github.event.inputs.ssh == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Init Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libncurses-dev build-essential git wget python3 bzip2 python3-pip
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          cd openwrt
          cp $GITHUB_WORKSPACE/$FEEDS_CONF .

      - name: Cache OpenWrt feeds
        uses: actions/cache@v6
        with:
          path: /workdir/openwrt/feeds
          key: ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-

      - name: Update & Install feeds
        timeout-minutes: 10
        working-directory: /workdir/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config & apply diy scripts
        run: |
          cd openwrt
          cp -f $GITHUB_WORKSPACE/config/128m.config .config
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: SSH to menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30

      - name: Push config
        run: |
          cp -f /workdir/openwrt/.config "$GITHUB_WORKSPACE/config/128m.config"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/128m.config
          git diff --cached --quiet || (
            git commit -m "Update config: 128m" || true
            git pull --rebase origin $(git rev-parse --abbrev-ref HEAD)
            git push -f origin HEAD:$(git rev-parse --abbrev-ref HEAD)
          )

  # ── 三代理并行编译（matrix 策略，每个代理一个 runner） ───
  build:
    name: Build ${{ matrix.proxy }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        proxy: [passwall, openclash, homeproxy]

    steps:
      - name: Check Server Performance
        run: |
          echo "代理: ${{ matrix.proxy }}"
          echo "CPU核心: $(nproc)"
          echo "CPU型号: $(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')"
          echo "内存: $(free -h | grep Mem | awk '{print $2}')"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set BUILD_DATE
        run: |
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gawk unzip file wget python3 \
            python3-pip python3-setuptools python3-yaml \
            rsync curl git \
            libncurses-dev libssl-dev libelf-dev \
            zlib1g-dev time subversion gettext patch perl \
            squashfs-tools \
            python3-ply python3-docutils python3-pyelftools \
            ccache
          pip3 install pyelftools --break-system-packages 2>/dev/null || true
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          # 每个矩阵 job 用独立目录，避免并行写冲突
          WORKDIR="/workdir/openwrt-${{ matrix.proxy }}"
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none "$WORKDIR"
          if [ -n "${REPO_COMMIT}" ]; then
            cd "$WORKDIR" && git checkout ${REPO_COMMIT}
          fi
          ln -sf "$WORKDIR" $GITHUB_WORKSPACE/openwrt

      - name: Setup caches
        uses: actions/cache@v6
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt-${{ matrix.proxy }}/dl
            /workdir/openwrt-${{ matrix.proxy }}/feeds
          key: ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}-${{ matrix.proxy }}
          restore-keys: |
            ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: Setup feeds & patches
        working-directory: /workdir/openwrt-${{ matrix.proxy }}
        run: |
          cp $GITHUB_WORKSPACE/$FEEDS_CONF .
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare build environment
        working-directory: /workdir/openwrt-${{ matrix.proxy }}
        run: |
          sudo fallocate -l 4G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          make toolchain/binutils/prepare V=s 2>/dev/null || true
          for rf in build_dir/toolchain-*/binutils-*/binutils/readelf.c; do
            if [ -f "$rf" ]; then
              sed -i 's/off64_t/off_t/g; s/fseeko64/fseeko/g' "$rf"
              echo "Patched $rf"
            fi
          done

      - name: Compile ${{ matrix.proxy }}
        id: compile
        working-directory: /workdir/openwrt-${{ matrix.proxy }}
        run: |
          CONFIG_FILE="config/x1pro-${{ matrix.proxy }}.config"
          NPROC=$(($(nproc) > 4 ? 4 : $(nproc)))
          echo "Proxy: ${{ matrix.proxy }}"
          echo "Config: $CONFIG_FILE"
          echo "Jobs: -j${NPROC}"

          cp -f "$GITHUB_WORKSPACE/$CONFIG_FILE" .config
          chmod +x "$GITHUB_WORKSPACE/$DIY_P1_SH"
          "$GITHUB_WORKSPACE/$DIY_P1_SH"
          chmod +x "$GITHUB_WORKSPACE/$DIY_P2_SH"
          "$GITHUB_WORKSPACE/$DIY_P2_SH"

          make defconfig
          make download -j$NPROC

          if [ "${{ inputs.verbose }}" = "true" ]; then
            make -j1 V=s CC="ccache gcc" CXX="ccache g++" 2>&1 | tee build.log || exit 1
          else
            make -j$NPROC CC="ccache gcc" CXX="ccache g++" 2>&1 | tee build.log || {
              echo "Multi-threaded failed, retrying single-threaded..."
              make -j1 V=s || exit 1
            }
          fi

          SYSUPGRADE=$(find bin/targets -name '*oray_x1pro-v1-ubootmod*sysupgrade.bin' 2>/dev/null | head -1)
          if [ -z "$SYSUPGRADE" ]; then
            echo "ERROR: No firmware!"
            find bin/targets -name "*.bin" 2>/dev/null | head -10
            exit 1
          fi
          echo "Built: $SYSUPGRADE ($(du -h "$SYSUPGRADE" | cut -f1))"

          # 重命名并放到 artifacts 目录
          mkdir -p "$GITHUB_WORKSPACE/firmware"
          cp "$SYSUPGRADE" "$GITHUB_WORKSPACE/firmware/ImmortalWrt-X1Pro-${{ matrix.proxy }}-sysupgrade.bin"
          ls -lh "$GITHUB_WORKSPACE/firmware/"

          echo "status=success" >> $GITHUB_OUTPUT
          ccache -s || true

      - name: Upload build.log (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log-${{ matrix.proxy }}
          path: /workdir/openwrt-${{ matrix.proxy }}/build.log
          retention-days: 7

      - name: Upload Binaries (Artifacts)
        uses: actions/upload-artifact@v7
        if: steps.compile.outputs.status == 'success'
        with:
          name: X1Pro-${{ matrix.proxy }}
          path: firmware/ImmortalWrt-X1Pro-${{ matrix.proxy }}-sysupgrade.bin
          retention-days: 14

  # ── 汇总 Release（等待所有编译完成） ──────────
  release:
    name: Create Release
    needs: build
    if: always() && !cancelled() && env.UPLOAD_RELEASE == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware_collection
          merge-multiple: true
          pattern: X1Pro-*

      - name: List firmware
        run: |
          echo "=== Collected Firmware ==="
          ls -lh firmware_collection/

      - name: Generate Release
        id: gen_release
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="X1Pro-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          NOTES="${{ env.BUILD_NOTES }}"

          {
            printf '## ImmortalWrt X1Pro Firmware\n\n'
            printf '**设备:** Oray X1 Pro (uboot)\n'
            printf '**分支:** openwrt-24.10-6.6\n'
            printf '**代理:** passwall / openclash / homeproxy\n'
            if [ -n "$NOTES" ]; then
              printf '\n**备注:** %s\n' "$NOTES"
            fi
            printf '\n## 固件\n\n'
            for f in firmware_collection/*.bin; do
              [ -f "$f" ] || continue
              printf '- %s (%s)\n' "$(basename "$f")" "$(du -h "$f" | cut -f1)"
            done
            printf '\n## 📥 下载\n\n'
            printf '从下方 Assets 下载对应代理的 sysupgrade.bin，通过 uboot Web UI 刷入。\n\n'
            printf '| 文件名 | 代理 |\n'
            printf '|--------|------|\n'
            printf '| ImmortalWrt-X1Pro-passwall-sysupgrade.bin | Passwall2 |\n'
            printf '| ImmortalWrt-X1Pro-openclash-sysupgrade.bin | OpenClash |\n'
            printf '| ImmortalWrt-X1Pro-homeproxy-sysupgrade.bin | HomeProxy |\n\n'
            printf '> 由 GitHub Actions 自动构建\n'
          } > release.txt

          echo "=== release.txt ==="
          cat release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: steps.gen_release.outputs.status == 'success'
        with:
          tag_name: ${{ steps.gen_release.outputs.release_tag }}
          body_path: release.txt
          files: |
            firmware_collection/*sysupgrade.bin

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 10
