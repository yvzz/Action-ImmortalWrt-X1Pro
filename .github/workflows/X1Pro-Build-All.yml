name: Build ImmortalWrt X1Pro All

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: 0 20 */3 * *   # UTC 00:00 = 北京 04:00，每3天一次
  repository_dispatch:
    types: [ "X1Pro Update" ]
  workflow_dispatch:
    inputs:
      notes:
        description: '编译备注（发布到 Release 页面）'
        required: false
        type: string
        default: ''
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/yvzz/immortalwrt-mt798x-6.6'
      commit:
        description: '指定源码commit，留空拉取最新'
        required: false
        type: string
        default: ''
      ssh:
        description: 'SSH 调试 (make menuconfig)'
        required: false
        type: boolean
        default: false
      verbose:
        description: '详细编译日志 V=s'
        required: false
        type: boolean
        default: false
      release:
        description: '发布到 Release'
        required: false
        type: boolean
        default: true

env:
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo || 'https://github.com/yvzz/immortalwrt-mt798x-6.6' }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release || github.event.client_payload.release || 'true' }}
  BUILD_NOTES: ${{ github.event.inputs.notes || github.event.client_payload.notes || '' }}
  TZ: Asia/Shanghai

jobs:
  # ── SSH 调试（仅手动触发 + ssh=true 时） ──────────
  menuconfig:
    name: Menuconfig
    if: github.event.inputs.ssh == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Init Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libncurses-dev build-essential git wget python3 bzip2 python3-pip
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          cd openwrt
          cp $GITHUB_WORKSPACE/$FEEDS_CONF .

      - name: Cache OpenWrt feeds
        uses: actions/cache@v6
        with:
          path: /workdir/openwrt/feeds
          key: ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-

      - name: Update & Install feeds
        timeout-minutes: 10
        working-directory: /workdir/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config & apply diy scripts
        run: |
          cd openwrt
          cp -f $GITHUB_WORKSPACE/config/128m.config .config
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: SSH to menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30

      - name: Push config
        run: |
          cp -f /workdir/openwrt/.config "$GITHUB_WORKSPACE/config/128m.config"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/128m.config
          git diff --cached --quiet || (
            git commit -m "Update config: 128m" || true
            git pull --rebase origin $(git rev-parse --abbrev-ref HEAD)
            git push -f origin HEAD:$(git rev-parse --abbrev-ref HEAD)
          )

  # ── 编译（单 job + for 循环，复用 toolchain） ───
  build:
    name: Build X1Pro
    runs-on: ubuntu-24.04

    steps:
      - name: Check Server Performance
        run: |
          echo "CPU核心: $(nproc)"
          echo "CPU型号: $(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')"
          echo "内存: $(free -h | grep Mem | awk '{print $2}')"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set BUILD_DATE
        run: |
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gawk unzip file wget python3 \
            python3-pip python3-setuptools python3-yaml \
            rsync curl git \
            libncurses-dev libssl-dev libelf-dev \
            zlib1g-dev time subversion gettext patch perl \
            squashfs-tools \
            python3-ply python3-docutils python3-pyelftools \
            ccache
          pip3 install pyelftools --break-system-packages 2>/dev/null || true
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Setup caches
        uses: actions/cache@v6
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
            /workdir/openwrt/feeds
          key: ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}
          restore-keys: |
            ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: Setup feeds & patches
        working-directory: /workdir/openwrt
        run: |
          cp $GITHUB_WORKSPACE/$FEEDS_CONF .
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ── Swap + 编译环境准备 ──
      - name: Prepare build environment
        run: |
          cd openwrt
          sudo fallocate -l 4G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          # binutils readelf.c musl fix
          make toolchain/binutils/prepare V=s 2>/dev/null || true
          for rf in build_dir/toolchain-*/binutils-*/binutils/readelf.c; do
            if [ -f "$rf" ]; then
              sed -i 's/off64_t/off_t/g; s/fseeko64/fseeko/g' "$rf"
              echo "Patched $rf"
            fi
          done

      # ── 三代理编译（passwall → openclash → homeproxy） ──
      - name: Multi-Proxy Compilation
        id: compile
        run: |
          PROXIES=("passwall" "openclash" "homeproxy")
          NPROC=$(($(nproc) > 4 ? 4 : $(nproc)))
          mkdir -p "$GITHUB_WORKSPACE/firmware_collection"
          cd /workdir/openwrt

          for PROXY in "${PROXIES[@]}"; do
            CONFIG_FILE="config/x1pro-${PROXY}.config"
            echo ""
            echo "=========================================="
            echo "  编译: $PROXY"
            echo "  配置: $CONFIG_FILE"
            echo "=========================================="

            # 加载配置
            cp -f "$GITHUB_WORKSPACE/$CONFIG_FILE" .config

            # 执行 diy 脚本
            chmod +x "$GITHUB_WORKSPACE/$DIY_P1_SH"
            "$GITHUB_WORKSPACE/$DIY_P1_SH"
            chmod +x "$GITHUB_WORKSPACE/$DIY_P2_SH"
            "$GITHUB_WORKSPACE/$DIY_P2_SH"

            make defconfig
            make download -j$NPROC

            if [ "${{ inputs.verbose }}" = "true" ]; then
              make -j1 V=s CC="ccache gcc" CXX="ccache g++" || exit 1
            else
              if ! make -j$NPROC CC="ccache gcc" CXX="ccache g++"; then
                echo "Multi-threaded failed, retrying single-threaded..."
                make -j1 V=s || exit 1
              fi
            fi

            # 收集并重命名固件
            SYSUPGRADE=$(find bin/targets -name '*oray_x1pro-v1-ubootmod*sysupgrade.bin' 2>/dev/null | head -1)
            if [ -z "$SYSUPGRADE" ]; then
              echo "ERROR: No firmware for $PROXY!"
              find bin/targets -name "*.bin" 2>/dev/null | head -10
              exit 1
            fi
            echo "Built: $SYSUPGRADE ($(du -h "$SYSUPGRADE" | cut -f1))"
            cp "$SYSUPGRADE" "$GITHUB_WORKSPACE/firmware_collection/ImmortalWrt-X1Pro-${PROXY}-sysupgrade.bin"

            # 清理中间产物，释放磁盘空间
            make clean 2>/dev/null || true
            rm -rf bin build_dir/tmp .config .config.old staging_dir/target-* 2>/dev/null || true
          done

          echo "Compilation successful"
          echo "status=success" >> $GITHUB_OUTPUT

          echo "=== 产物 ==="
          ls -lh "$GITHUB_WORKSPACE/firmware_collection/"

      - name: List artifacts
        run: |
          echo "=== Built Firmware ==="
          ls -lh "$GITHUB_WORKSPACE/firmware_collection/"

      - name: Cache save (always)
        if: always()
        uses: actions/cache@v6
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
            /workdir/openwrt/feeds
          key: ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}

      - name: Upload Binaries (Artifacts)
        uses: actions/upload-artifact@v7
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt-X1Pro-All-${{ env.BUILD_DATE }}
          path: |
            firmware_collection/*sysupgrade.bin

      # ── Release ──
      - name: Generate Release
        id: release
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="X1Pro-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Release: $RELEASE_TAG"

          # 将发布说明写入 release.txt
          {
            printf '## ImmortalWrt X1Pro Firmware\n\n'
            printf '**设备:** Oray X1 Pro (uboot)\n'
            printf '**分支:** openwrt-24.10-6.6\n'
            printf '**代理:** passwall (xray) / openclash (mihomo) / homeproxy (sing-box)\n'
            if [ -n "${{ env.BUILD_NOTES }}" ]; then
              printf '\n**备注:** %s\n' "${{ env.BUILD_NOTES }}"
            fi
            printf '\n## 固件\n'
            for f in $GITHUB_WORKSPACE/firmware_collection/*.bin; do
              [ -f "$f" ] || continue
              echo "- $(basename "$f") ($(du -h "$f" | cut -f1))"
            done
            printf '\n## 📥 下载\n\n'
            printf '从下方 Assets 下载对应代理的 sysupgrade.bin，通过 uboot Web UI 刷入。\n\n'
            printf '| 文件名 | 代理 |\n|--------|------|\n'
            printf '| ImmortalWrt-X1Pro-passwall-sysupgrade.bin | Passwall2 (xray-core) |\n'
            printf '| ImmortalWrt-X1Pro-openclash-sysupgrade.bin | OpenClash (mihomo) |\n'
            printf '| ImmortalWrt-X1Pro-homeproxy-sysupgrade.bin | HomeProxy (sing-box) |\n'
            printf '\n> 由 GitHub Actions 自动构建\n'
          } > release.txt

          echo "=== release.txt ==="
          cat release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: steps.release.outputs.status == 'success'
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          body_path: release.txt
          files: |
            firmware_collection/*sysupgrade.bin

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          retain_days: 0
          keep_minimum_runs: 10
