name: Delete Old Releases

on:
  schedule:
    - cron: '0 3 * * 1'  # 每周一 11:00 北京时间
  workflow_dispatch:
    inputs:
      retention_days:
        description: '保留天数'
        required: false
        default: '7'
        type: number

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Delete old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETENTION: ${{ inputs.retention_days }}
        run: |
          RETENTION=${RETENTION:-7}
          CUTOFF=$(date -d "$RETENTION days ago" +%s)
          echo "保留最近 ${RETENTION} 天的 Release"

          # 获取所有 release（跳过 draft）
          releases=$(gh release list --exclude-drafts --json tagName,publishedAt --jq '.[] | "\(.publishedAt)|\(.tagName)"')

          if [ -z "$releases" ]; then
            echo "没有可删除的 Release"
            exit 0
          fi

          deleted=0
          kept=0

          while IFS='|' read -r published tag; do
            [ -z "$tag" ] && continue

            published_ts=$(date -d "$published" +%s 2>/dev/null)
            if [ -z "$published_ts" ]; then
              echo "  跳过: $tag (无法解析日期)"
              continue
            fi

            if [ "$published_ts" -lt "$CUTOFF" ]; then
              echo "  删除: $tag (发布于 $published)"
              gh release delete "$tag" --yes --repo ${{ github.repository }}
              deleted=$((deleted + 1))
            else
              echo "  保留: $tag (发布于 $published)"
              kept=$((kept + 1))
            fi
          done <<< "$releases"

          echo ""
          echo "完成: 删除 ${deleted} 个, 保留 ${kept} 个"
